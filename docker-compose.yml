services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: yoguide
      POSTGRES_PASSWORD: yoguide
      POSTGRES_DB: yoguide
    volumes:
      - yoguide-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoguide"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3030:3030"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://yoguide:yoguide@postgres:5432/yoguide?schema=public
      DIRECT_URL: postgresql://yoguide:yoguide@postgres:5432/yoguide?schema=public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  yoguide-pg:
